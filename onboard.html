<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enterprise Onboarding — Ordera Bot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        .onboard-card { background: #111; border: 1px solid var(--border); padding: 50px; border-radius: 24px; max-width: 600px; margin: 0 auto; text-align: center; }
        .step-pill { background: rgba(209, 255, 82, 0.1); color: var(--accent); padding: 4px 16px; border-radius: 99px; font-size: 11px; font-weight: 700; text-transform: uppercase; margin-bottom: 30px; display: inline-block; }
        .onboard-form { text-align: left; margin-top: 40px; }
        .onboard-form label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 2px; }
        .onboard-form input { width: 100%; background: #000; border: 1px solid var(--border); padding: 16px; border-radius: 8px; color: #fff; margin-bottom: 24px; outline: none; transition: 0.3s; }
        .onboard-form input:focus { border-color: var(--accent); }
    </style>
</head>
<body>
    <div class="scanline-layer"></div>
    <nav>
        <a href="index.html" class="logo">Ordera Bot</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="how.html">How it Works</a>
            <a href="demo.html">Simulation</a>
        </div>
        <a href="pricing.html" class="btn-sleek">Pricing</a>
    </nav>

    <main class="page-container">
        <div class="onboard-card">
            <div class="step-pill">Phase 01: Identity Calibration</div>
            <h2 style="font-family: var(--font-display); font-size: 48px; font-style: italic; margin-bottom: 10px;">Onboarding</h2>
            <p style="color: var(--text-dim); font-size: 16px;">Initialize your enterprise neural network link.</p>

            <form class="onboard-form" onsubmit="handleOnboard(event)">
                <label>Restaurant Name</label>
                <input type="text" id="resName" placeholder="Elite Cuisines" required>
                
                <label>Owner / Manager Name</label>
                <input type="text" id="ownerName" placeholder="M. Ashfaq" required>

                <label>Active WhatsApp Number</label>
                <input type="text" id="waNum" placeholder="+94 70 480 0058" required>

                <button type="submit" class="btn-sleek" style="width: 100%;">Establish Link</button>
            </form>
        </div>
    </main>

    <footer>
        <div style="border-top: 1px solid var(--border); padding: 40px 8%; text-align: center; color: var(--text-dim); font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">
            &copy; 2026 Ordera Bot Infrastructure. Engineered by M. ASHFAQ.
        </div>
    </footer>

    <script>
        const handleOnboard = (e) => {
            e.preventDefault();
            const res = document.getElementById('resName').value;
            const wa = document.getElementById('waNum').value;
            window.location.href = `https://wa.me/94704800058?text=Onboarding Ordera Bot for ${res}. WhatsApp Uplink: ${wa}`;
        };
    </script>
</body>
</html>
