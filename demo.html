<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Simulation — Ordera Bot</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Instrument+Serif:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="global.css">
    <style>
        .sim-grid { display: grid; grid-template-columns: 400px 1fr; gap: 60px; max-width: 1300px; margin: 0 auto; position: relative; z-index: 5; }
        .phone { background: #000; border: 1px solid var(--border); border-radius: 40px; height: 550px; position: relative; overflow: hidden; box-shadow: 0 50px 100px rgba(0,0,0,0.8); }
        .chat-area { height: 430px; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .msg { padding: 12px 16px; border-radius: 12px; font-size: 13px; max-width: 85%; animation: revealText 0.4s ease forwards; }
        .msg-bot { background: #1a1a1a; color: #fff; align-self: flex-start; border-left: 3px solid var(--accent); }
        .msg-user { background: var(--accent); color: #000; align-self: flex-end; font-weight: 700; }
        .typing-dots { display: inline-flex; gap: 4px; padding: 5px 0; }
        .typing-dots span { width: 5px; height: 5px; background: var(--accent); border-radius: 50%; animation: pulse 1s infinite; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }
        .chat-input-form { position: absolute; bottom: 0; width: 100%; padding: 20px; background: #000; display: flex; gap: 10px; border-top: 1px solid var(--border); }
        .chat-input-form input { flex: 1; background: #111; border: 1px solid var(--border); border-radius: 4px; padding: 12px; color: #fff; outline: none; }

        @media (max-width: 768px) {
            .sim-grid {
                grid-template-columns: 1fr;
                gap: 30px;
            }
            .phone {
                height: 500px;
                width: 100%;
            }
            .chat-area {
                height: 380px;
            }
            h2 {
                font-size: 36px !important;
                text-align: center;
            }
        }
    </style>

</head>
<body>
    <div class="scanline-layer"></div>
    <nav>
        <a href="index.html" class="logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right: 12px; vertical-align: middle; filter: drop-shadow(0 0 8px var(--accent));"><path d="M12 2a2 2 0 0 1 2 2c0 .74-.4 1.39-1 1.73V7h1a7 7 0 0 1 7 7v1a1 1 0 0 1-1 1h-2v-2a5 5 0 0 0-5-5H9a5 5 0 0 0-5 5v2H2a1 1 0 0 1-1-1v-1a7 7 0 0 1 7-7h1V5.73A2 2 0 0 1 12 2z"/><path d="M16 16v2a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2v-2"/><path d="M12 22v-4"/></svg>
            Ordera Bot
        </a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="how.html">How it Works</a>
            <a href="demo.html" class="active">Simulation</a>
            <a href="pricing.html">Pricing</a>
        </div>
        <a href="pricing.html" class="btn-sleek">Deploy Now</a>
    </nav>

    <main class="page-container">
        <h2 style="font-family: var(--font-display); font-size: 64px; font-style: italic; margin-bottom: 40px;">Live Simulation</h2>
        <div class="sim-grid">
            <div class="phone">
                <div class="chat-area" id="chatArea"></div>
                <form class="chat-input-form" onsubmit="window.handleChat(event)">
                    <input type="text" id="chatInput" placeholder="Message Ordera Bot..." autocomplete="off">
                    <button type="submit" style="background: var(--accent); border:none; width:44px; height:44px; border-radius:4px; cursor:pointer; font-weight:800;">→</button>
                </form>
            </div>
            <div style="background: #000; border: 1px solid var(--border); border-radius: 12px; padding: 30px; height: 550px; overflow-y: auto;">
                <h3 style="font-size: 14px; margin-bottom: 30px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 3px;">Kitchen Ecosystem</h3>
                <div id="demoKDS"></div>
            </div>
        </div>
    </main>

    <footer>
        <div style="border-top: 1px solid var(--border); padding: 40px 8%; text-align: center; color: var(--text-dim); font-size: 12px; letter-spacing: 1px; text-transform: uppercase;">
            &copy; 2026 Ordera Bot Infrastructure. Engineered by M. ASHFAQ.
        </div>
    </footer>

    <script src="bot.js"></script>
</body>
</html>
